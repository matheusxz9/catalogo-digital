name: Deploy

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/deploy-backend.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync backend files
        run: |
          rsync -avz --delete --exclude='.env' --exclude='venv' --exclude='__pycache__' \
            backend/ root@${{ secrets.HETZNER_HOST }}:/root/CatalogoAPI/

      - name: Sync frontend dist
        run: |
          rsync -avz --delete \
            frontend/dist/ root@${{ secrets.HETZNER_HOST }}:/root/catalog-frontend/

      - name: Restart container
        run: |
          ssh root@${{ secrets.HETZNER_HOST }} \
            "cd /root && docker compose build catalogo && docker compose up -d catalogo"
