name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files and restart container
        run: |
          rsync -avz --delete --exclude='.env' --exclude='venv' --exclude='__pycache__' \
            backend/ root@${{ secrets.HETZNER_HOST }}:/root/CatalogoAPI/
          ssh root@${{ secrets.HETZNER_HOST }} \
            "cd /root && docker compose build catalogo && docker compose up -d catalogo"
