<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Studio Bella Mizi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rose: {
                50:  '#fff1f8',
                100: '#ffe4f3',
                200: '#ffc9e8',
                300: '#ff9dd0',
                400: '#ff61ae',
                500: '#e91e8c',
                600: '#d01278',
                700: '#b00e63',
                800: '#921053',
                900: '#7a1248',
              },
              blush: {
                50:  '#fdf5f5',
                100: '#f9e8e8',
                200: '#f5d5d5',
              },
              charcoal: '#1a1a2e',
            },
            fontFamily: {
              display: ['Cormorant Garamond', 'Georgia', 'serif'],
              body: ['DM Sans', 'system-ui', 'sans-serif'],
            },
            boxShadow: {
              'card': '0 2px 12px rgba(233,30,140,0.06), 0 1px 3px rgba(0,0,0,0.06)',
              'card-hover': '0 12px 40px rgba(233,30,140,0.12), 0 4px 12px rgba(0,0,0,0.08)',
              'modal': '0 24px 64px rgba(0,0,0,0.18)',
            },
            borderRadius: {
              'xl': '16px',
              '2xl': '24px',
            },
            animation: {
              'fade-up': 'fadeUp 0.4s ease forwards',
              'skeleton': 'skeleton 1.4s ease infinite',
              'spin-slow': 'spin 0.8s linear infinite',
            },
            keyframes: {
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              skeleton: {
                '0%': { backgroundPosition: '200% 0' },
                '100%': { backgroundPosition: '-200% 0' },
              },
            },
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { font-family: 'DM Sans', system-ui, sans-serif; }
      h1, h2, h3, .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
      .skeleton-shimmer {
        background: linear-gradient(90deg, #f3e8ef 25%, #fdf5f5 50%, #f3e8ef 75%);
        background-size: 200% 100%;
        animation: skeleton 1.4s ease infinite;
      }
      @keyframes skeleton {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }
      .card-hover:hover { transform: translateY(-4px); }
      .img-zoom { transition: transform 0.4s ease; }
      .img-zoom:hover { transform: scale(1.06); }
      input:focus, textarea:focus, select:focus { outline: none; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #fdf5f5; }
      ::-webkit-scrollbar-thumb { background: #f9c0da; border-radius: 99px; }
    </style>
  </head>
  <body class="bg-blush-50 text-charcoal">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
